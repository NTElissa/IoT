version: '3.8'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/smart_iv_monitoring
      JWT_SECRET: change_this_to_a_long_random_string
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:4173
      LOW_FLUID_THRESHOLD: 10
      WARNING_FLUID_THRESHOLD: 20
      HIGH_FLUID_THRESHOLD: 90
      ESCALATION_MINUTES: 10
      SIMULATION_TICK_MS: 8000

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '4173:4173'
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
      VITE_SOCKET_URL: http://localhost:5000

volumes:
  mongo_data:
